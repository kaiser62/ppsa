# =============================================================================
# PPSA - Main Docker Stack (Phase 2: hardened)
# =============================================================================

# ponytail: docker-volume-backup reads `stop-during-backup` from CONTAINERS,
# never from volumes — these labels used to sit here and were silently ignored,
# so offen backed up palworld_data HOT. Palworld's live in-game backup dir
# (Pal/Saved/SaveGames/*/backup/world/<ts>) rotates mid-tar, a file vanishes
# between walk and read, and the WHOLE archive aborts ("lstat: no such file or
# directory") — every backup failed, none were ever written. The stop label now
# lives on the palworld SERVICE (see below) so offen stops it for a consistent
# snapshot. webui/wgdashboard volumes are small and static enough to tar hot.
volumes:
  palworld_data:
    labels:
      - "ppsa.volume=palworld"
  wgdashboard_data:
    labels:
      - "ppsa.volume=wgdashboard"
  webui_data:
    labels:
      - "ppsa.volume=webui"

# ponytail: single default network. Per-service network isolation adds complexity
# for negligible security gain behind UFW. Add if multi-tenant needed.

services:
  # ---------------------------------------------------------------------------
  # Palworld Dedicated Server
  # ---------------------------------------------------------------------------
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    container_name: ppsa-palworld
    restart: unless-stopped
    stop_grace_period: 120s    # generous for world save
    ports:
      - "8211:8211/udp"
      - "27015:27015/udp"
    volumes:
      - palworld_data:/palworld
    environment:
      PUID: 1000
      PGID: 1000
      PORT: 8211
      PLAYERS: ${MAX_PLAYERS:-16}
      SERVER_PASSWORD: ${SERVER_PASSWORD:-}
      SERVER_NAME: ${SERVER_NAME:-PPSA Server}
      SERVER_DESCRIPTION: ${SERVER_DESCRIPTION:-Managed by PPSA}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      MULTITHREADING: ${MULTITHREADING:-true}
      RCON_ENABLED: ${RCON_ENABLED:-true}
      RCON_PORT: ${RCON_PORT:-25575}
      RESTAPI_ENABLED: ${RESTAPI_ENABLED:-true}
      RESTAPI_PORT: ${RESTAPI_PORT:-8212}
      COMMUNITY: ${COMMUNITY:-false}
      TZ: ${TZ:-UTC}
      UPDATE_ON_BOOT: false
    healthcheck:
      test: ["CMD", "rcon-cli", "Info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          # ponytail: defaults 1 vCPU / 2GB work on small VMs (1-2 vCPU). Override
          # per-host in .env for bigger machines. Do NOT raise to 4.0 by default
          # — 2-CPU VM RCU stalls during Steam download are a vboxguest issue,
          # not a CPU-count issue, and are not fixed by raising this limit.
          cpus: "${PPSA_CPUS:-1.0}"
          memory: "${PPSA_MEMORY:-2G}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "ppsa.component=palworld"
      # ponytail: offen stops this container for the duration of a backup so the
      # world save + SaveGames tree is consistent and doesn't churn mid-tar.
      # Trade-off: a backup (scheduled 3AM or manual "Backup Now") briefly drops
      # players for the length of the tar. Required — hot backups of the live
      # save dir fail outright (see the volumes block above).
      - "docker-volume-backup.stop-during-backup=true"

  # ---------------------------------------------------------------------------
  # Palworld REST API relay sidecar
  # ---------------------------------------------------------------------------
  # ponytail: thijsvanloef/palworld-server-docker's game binary hardcodes its
  # REST API listener to 127.0.0.1 inside its own container netns — there is no
  # PalWorldSettings.ini key or env var to make it bind 0.0.0.0, so no other
  # container on the compose bridge network (including webui) can ever reach
  # palworld:8212 directly (confirmed via debug session
  # webui-dashboard-stuck-loading: raw TCP connects from webui to both
  # palworld's DNS name and its bridge IP time out identically, while curl from
  # inside the palworld container to its own loopback succeeds). This sidecar
  # shares palworld's network namespace (network_mode: service:palworld) so it
  # can see that loopback-bound socket, and relays a NEW port (18212, chosen to
  # avoid any bind ambiguity with palworld's own 127.0.0.1:8212 listener) on
  # 0.0.0.0 back out to the bridge network under the `palworld` DNS name/IP
  # (shared netns = shared identity). webui's own networking/ports/firewall
  # model is untouched — only PALWORLD_API_URL's port changes.
  palworld-rest-proxy:
    image: alpine/socat:latest
    container_name: ppsa-palworld-rest-proxy
    restart: unless-stopped
    network_mode: "service:palworld"
    depends_on:
      palworld:
        condition: service_started
    command: >-
      TCP-LISTEN:18212,fork,reuseaddr
      TCP:127.0.0.1:8212
    healthcheck:
      # ponytail: alpine/socat has no ss/curl, only busybox netstat + nc.
      # netstat -tln lists listening TCP sockets without needing a real peer.
      test: ["CMD-SHELL", "netstat -tln 2>/dev/null | grep -q ':18212 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "ppsa.component=palworld-rest-proxy"

  # ---------------------------------------------------------------------------
  # Web Management UI
  # ---------------------------------------------------------------------------
  webui:
    build:
      context: ../docker/webui
      dockerfile: Dockerfile
    container_name: ppsa-webui
    restart: unless-stopped
    ports:
      - "8080:8080"   # UFW restricts to authorized IPs; LAN access by default
    volumes:
      - webui_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/wireguard:/etc/wireguard:rw
      - ../backups:/backups:rw
      - ../.env:/opt/ppsa/.env:rw  # ponytail: webui reads AND writes this for /api/env (Config/Backup tabs)
      - palworld_data:/palworld-data  # ponytail: rw, so the Mods tab can drop .pak files into Pal/Content/Paks/~mods
      - /:/host:ro  # ponytail: webui needs access to host's nmcli/wpa_supplicant for Wi-Fi scan
      - /etc/ppsa:/etc/ppsa:rw  # ponytail: override /:/host:ro for this dir so iptables-save persists across reboots. Docker's most-specific-path resolution makes this rw.
    cap_add:
      - NET_ADMIN
    environment:
      TZ: ${TZ:-UTC}
      # ponytail: points at the palworld-rest-proxy sidecar's relay port
      # (18212), NOT palworld's own RESTAPI_PORT (8212) directly — Palworld's
      # REST API binds 127.0.0.1-only inside its own container, unreachable
      # from webui's separate netns. The proxy shares palworld's network
      # namespace and relays 18212 -> 127.0.0.1:8212, and since it shares that
      # namespace it answers under the same `palworld` DNS name/IP. See the
      # palworld-rest-proxy service definition above for the full rationale
      # (debug session webui-dashboard-stuck-loading).
      PALWORLD_API_URL: http://palworld:18212
      PALWORLD_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      DATA_DIR: /app/data
    # ponytail: webui starts as soon as palworld *container* starts, not when
    # palworld becomes *healthy*. Palworld downloads 3.8GB Steam update on
    # first run, blocking health check (rcon-cli Info) for 5+ minutes. With
    # service_healthy, webui sits in "Created" forever. Use service_started
    # so user can reach the WebUI while server is still downloading.
    depends_on:
      palworld:
        condition: service_started
      palworld-rest-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "ppsa.component=webui"

  # ---------------------------------------------------------------------------
  # WireGuard Dashboard
  # ---------------------------------------------------------------------------
  wgdashboard:
    image: ghcr.io/wgdashboard/wgdashboard:latest
    container_name: ppsa-wgdashboard
    restart: unless-stopped
    ports:
      - "10086:10086"  # UFW restricts to authorized IPs
    volumes:
      - wgdashboard_data:/opt/wireguarddashboard/app/db
      - /etc/wireguard:/etc/wireguard
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    environment:
      TZ: ${TZ:-UTC}
    healthcheck:
      # ponytail: Python urllib over wget — Python slim images lack wget/curl
      test: ["CMD-SHELL", "python3 -c \"from urllib.request import urlopen; urlopen('http://localhost:10086')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "ppsa.component=wireguard"

  # ---------------------------------------------------------------------------
  # Backup Agent (offen/docker-volume-backup v2)
  # ---------------------------------------------------------------------------
  backup:
    image: offen/docker-volume-backup:v2
    container_name: ppsa-backup
    restart: unless-stopped
    volumes:
      - palworld_data:/backup/palworld_data:ro
      - webui_data:/backup/webui_data:ro
      - wgdashboard_data:/backup/wgdashboard_data:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../backups:/archive
    environment:
      BACKUP_CRON_EXPRESSION: ${BACKUP_SCHEDULE:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      # offen v2 BACKUP_FILENAME uses strftime tokens (%Y%m%d), NOT Go
      # template functions — `{{ .Now | date ... }}` made every backup run
      # die with `template: extension:1: function "date" not defined`.
      # Pruning prefix must match the filename prefix or retention never
      # deletes anything.
      BACKUP_PRUNING_PREFIX: ppsa-
      BACKUP_FILENAME: "ppsa-%Y%m%d-%H%M%S.tar.gz"
      # Steam's transient dirs contain multi-GB files that grow while
      # SteamCMD downloads/updates the game; tar-ing a growing file aborts
      # the whole backup with `archive/tar: write too long`. They're
      # re-downloadable caches anyway — never worth backing up.
      BACKUP_EXCLUDE_REGEXP: "steamapps/(downloading|temp|workshop)"
      NOTIFY_URLS: ${DISCORD_WEBHOOK_URL:-}
    healthcheck:
      # ponytail: image is alpine:3.24 (NOT scratch — busybox shell + kill are
      # present), PID 1 is /usr/bin/backup -foreground. The upstream image
      # has no built-in healthcheck; use kill -0 1 to confirm the backup
      # process is still alive. Exits 0 if PID 1 exists (and is not owned
      # by us), 1 otherwise. Same pattern as watchtower/backup kept simple.
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 5m
      timeout: 5s
      retries: 2
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "ppsa.component=backup"

  # ---------------------------------------------------------------------------
  # Watchtower (Automatic Updates)
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    # ponytail: using containrrr/watchtower; switch to nicholas-fedor/watchtower if Docker 29+ issues arise
    container_name: ppsa-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 4 * * *"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_LABELS: "ppsa.component"
      WATCHTOWER_INCLUDE_RESTARTING: "false"
    healthcheck:
      # ponytail: containrrr/watchtower is FROM scratch — no pgrep/sh exists,
      # so pgrep -f watchtower reports "executable not found" → permanently
      # unhealthy. The binary itself supports a built-in health check via
      # --health-check (exits 0 when not running as PID 1, see
      # containrrr/watchtower cmd/root.go). Use that instead — it matches
      # the image's upstream HEALTHCHECK CMD. The check is a no-op (process
      # alive ⇒ binary runs ⇒ exit 0) but never flaps, which is the
      # actual goal of a healthcheck on a long-running daemon.
      test: ["CMD", "/watchtower", "--health-check"]
      interval: 5m
      timeout: 5s
      retries: 2
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "ppsa.component=watchtower"
