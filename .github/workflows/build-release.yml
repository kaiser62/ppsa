# =============================================================================
# PPSA - Build & Release
# =============================================================================
# Strategy for speed:
#   1. Single build job produces a raw disk image (cached as actions/cache).
#   2. USB and VBox jobs run in parallel as post-processing steps.
#   3. VBox job does NOT rebuild — it converts the USB image artifact to VDI.
#   4. zstd -3 compression: 10x faster than xz -0, similar size.
#   5. On push to master: USB only (faster feedback). VBox only on tags.
# =============================================================================

name: Build USB Image

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g., v1.0.0-test)'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # 1. Build the raw image once. Cache the rootfs between runs.
  # -------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache rootfs
        id: cache-rootfs
        uses: actions/cache@v4
        with:
          path: /tmp/ppsa-rootfs-cache.tar.gz
          # Hash the entire scripts/ + key configs so PPSA changes invalidate cache
          key: ppsa-rootfs-${{ hashFiles('scripts/**/*.sh', 'scripts/**/*.conf', 'compose/**', 'docker/**', '.github/workflows/build-release.yml') }}-v2

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            debootstrap parted e2fsprogs dosfstools \
            grub-pc-bin grub-efi-amd64-bin rsync cpio \
            xz-utils util-linux zstd

      - name: Build raw image
        env:
          TMPDIR: ${{ runner.temp }}
          PPSA_CACHE_FILE: /tmp/ppsa-rootfs-cache.tar.gz
          PPSA_SKIP_BOOTSTRAP: ${{ steps.cache-rootfs.outputs.cache-hit == 'true' && '1' || '' }}
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          sudo bash scripts/build-live-usb.sh \
            --output "ppsa-raw-${VER}.img"

      - name: Upload raw image (for VBox job to convert)
        uses: actions/upload-artifact@v4
        with:
          name: ppsa-raw-image
          path: ppsa-raw-*.img
          retention-days: 1

  # -------------------------------------------------------------------------
  # 2a. USB output: compress and upload to release
  # -------------------------------------------------------------------------
  usb:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    steps:
      - name: Download raw image
        uses: actions/download-artifact@v4
        with:
          name: ppsa-raw-image

      - name: Install zstd
        run: sudo apt-get install -y -qq zstd

      - name: Compress with zstd
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          zstd -3 -T0 --no-progress "ppsa-raw-${VER}.img" -o "ppsa-usb-${VER}.img.zst"

      - name: Generate checksum
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          F="ppsa-usb-${VER}.img.zst"
          sha256sum "$F" > "${F}.sha256"

      - name: Create/Update Release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: ppsa-usb-*
          tag_name: ${{ github.ref_name || inputs.version }}
          name: PPSA ${{ github.ref_name || inputs.version }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ contains(github.ref_name || inputs.version, '-') }}
          body: |
            ## PPSA ${{ github.ref_name || inputs.version }}

            ### Download
            - `ppsa-usb-${{ github.ref_name || inputs.version }}.img.zst` — zstd-compressed disk image
            - `ppsa-usb-${{ github.ref_name || inputs.version }}.img.zst.sha256` — SHA-256

            ### VirtualBox (VDI)
            - `ppsa-vbox-${{ github.ref_name || inputs.version }}.vdi.zst` — VirtualBox disk image
            - `ppsa-vbox-${{ github.ref_name || inputs.version }}.vdi.zst.sha256` — SHA-256

            ### Usage
            1. Download `.img.zst` (or `.vdi.zst` for VirtualBox)
            2. Extract: `zstd -d ppsa-usb-*.img.zst`
            3. USB: `dd if=ppsa-usb-*.img of=/dev/sdX bs=4M status=progress`
            4. VBox: New VM → Use existing VDI → boot
            5. Auto-resizes to fill drive on first boot

  # -------------------------------------------------------------------------
  # 2b. VBox output: convert raw → VDI → compress
  # Only on tags (saves CI minutes on regular pushes)
  # -------------------------------------------------------------------------
  virtualbox:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download raw image
        uses: actions/download-artifact@v4
        with:
          name: ppsa-raw-image

      - name: Install qemu-utils + zstd
        run: sudo apt-get install -y -qq zstd qemu-utils

      - name: Convert raw → VDI
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          qemu-img convert -f raw -O vdi "ppsa-raw-${VER}.img" "ppsa-vbox-${VER}.vdi"
          rm -f "ppsa-raw-${VER}.img"

      - name: Compress with zstd
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          zstd -3 -T0 --no-progress "ppsa-vbox-${VER}.vdi" -o "ppsa-vbox-${VER}.vdi.zst"

      - name: Generate checksum
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          F="ppsa-vbox-${VER}.vdi.zst"
          sha256sum "$F" > "${F}.sha256"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ppsa-vbox-*
          tag_name: ${{ github.ref_name || inputs.version }}
          name: PPSA ${{ github.ref_name || inputs.version }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ contains(github.ref_name || inputs.version, '-') }}
