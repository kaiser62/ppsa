# =============================================================================
# PPSA - Build & Release
# =============================================================================
# Release policy: ONLY a `vX.Y.Z` tag push creates a public GitHub Release.
#   - push to master: build only, validates the pipeline, no release.
#   - workflow_dispatch: build only, uploads workflow artifacts for manual
#     testing/download — never publishes a public release.
#   - push tags/v*: build + publish a Release with USB img + VBox VDI.
#
# Strategy for speed:
#   1. Two parallel jobs (USB, VBox), each with its own build+compress.
#   2. zstd -3 compression: ~10x faster than xz -0, similar ratio.
#   3. Dropped linux-headers + nonfree firmware from build script.
#   4. Cache key includes all PPSA source files.
#   5. VBox job builds a smaller (4GB) image for quick testing.
# =============================================================================

name: Build USB Image

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Label for this test build (e.g. v1.0.0-test). Does not publish a release.'
        required: true
        default: 'v0.0.0-dev'
      expose_ssh_lan:
        description: 'Expose SSH (22, 10022) on LAN/WAN. Default: WireGuard-only.'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  usb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache rootfs
        id: cache-rootfs
        uses: actions/cache@v4
        with:
          path: /tmp/ppsa-rootfs-cache.tar.gz
          # Hash all PPSA sources so changes invalidate cache
          key: ppsa-rootfs-${{ hashFiles('scripts/**/*.sh', 'compose/**', 'docker/**', '.github/workflows/build-release.yml') }}-v3

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            debootstrap parted e2fsprogs dosfstools \
            grub-pc-bin grub-efi-amd64-bin rsync cpio \
            xz-utils util-linux zstd

      - name: Build USB image
        env:
          TMPDIR: ${{ runner.temp }}
          PPSA_CACHE_FILE: /tmp/ppsa-rootfs-cache.tar.gz
          PPSA_SKIP_BOOTSTRAP: ${{ steps.cache-rootfs.outputs.cache-hit == 'true' && '1' || '' }}
          # PPSA WireGuard auto-registration (optional). Set as repo secrets.
          # PPSA_WG_API_URL  - full wg-easy URL, e.g. http://wg.example.com:51831
          # PPSA_WG_API_USER - wg-easy admin username
          # PPSA_WG_API_PASS - wg-easy admin password
          # PPSA_WG_PEER_NAME - optional, defaults to 'ppsa-server'
          # PPSA_WG_PREFERRED_IP - optional, e.g. 10.8.0.2 (wg-easy v15 may ignore)
          PPSA_WG_API_URL: ${{ secrets.PPSA_WG_API_URL }}
          PPSA_WG_API_USER: ${{ secrets.PPSA_WG_API_USER }}
          PPSA_WG_API_PASS: ${{ secrets.PPSA_WG_API_PASS }}
          PPSA_WG_PEER_NAME: ${{ secrets.PPSA_WG_PEER_NAME }}
          PPSA_WG_PREFERRED_IP: ${{ secrets.PPSA_WG_PREFERRED_IP }}
          # Optional LAN/public WG endpoint overrides (see
          # docs/dual-boot-install.md). Both have sensible defaults
          # in ppsa-wireguard-register.sh so unset is fine.
          PPSA_WG_LAN_ENDPOINT: ${{ secrets.PPSA_WG_LAN_ENDPOINT }}
          PPSA_WG_PUBLIC_ENDPOINT: ${{ secrets.PPSA_WG_PUBLIC_ENDPOINT }}
          # Hardcoded WireGuard failsafe config (base64 full wg0.conf, used
          # when auto-registration above fails or is unconfigured).
          PPSA_WG_FALLBACK_CONF_B64: ${{ secrets.PPSA_WG_FALLBACK_CONF_B64 }}
          # SSH LAN/WAN exposure opt-in (default false = WireGuard-only).
          PPSA_EXPOSE_SSH_LAN: ${{ inputs.expose_ssh_lan || 'false' }}
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          # sudo env_reset (the sudoers default) strips the PPSA_WG_*
          # env vars that the env: block above just set. -E preserves them
          # so build-live-usb.sh can actually bake the WireGuard creds
          # into the image.
          sudo -E bash scripts/build-live-usb.sh \
            --output "ppsa-usb-${VER}.img"

      - name: Compress (zstd -10, under 2GB GitHub asset limit)
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          zstd -10 -T0 --no-progress "ppsa-usb-${VER}.img" -o "ppsa-usb-${VER}.img.zst"
          # Delete raw 8GB to avoid GitHub asset upload (2GB limit)
          rm -f "ppsa-usb-${VER}.img"

      - name: Generate checksum
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          F="ppsa-usb-${VER}.img.zst"
          sha256sum "$F" > "${F}.sha256"

      - name: Upload build artifact (workflow_dispatch only, not a release)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ppsa-usb-${{ inputs.version }}
          path: |
            ppsa-usb-*.zst
            ppsa-usb-*.zst.sha256
          retention-days: 14

      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ppsa-usb-*.zst
            ppsa-usb-*.zst.sha256
          tag_name: ${{ github.ref_name }}
          name: PPSA ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## PPSA ${{ github.ref_name }}

            ### Download
            - `ppsa-usb-${{ github.ref_name }}.img.zst` — zstd-compressed disk image (8GB raw → ~2GB compressed)
            - `ppsa-usb-${{ github.ref_name }}.img.zst.sha256` — SHA-256 checksum

            ### VirtualBox (VDI)
            - `ppsa-vbox-${{ github.ref_name }}.vdi.zst` — VirtualBox disk image (4GB raw)
            - `ppsa-vbox-${{ github.ref_name }}.vdi.zst.sha256` — SHA-256 checksum

            ### Usage
            1. Download `.img.zst` (or `.vdi.zst` for VirtualBox)
            2. Extract: `zstd -d ppsa-usb-*.img.zst`
            3. USB: `dd if=ppsa-usb-*.img of=/dev/sdX bs=4M status=progress`
            4. VBox: New VM → Use existing VDI → boot
            5. Auto-resizes to fill drive on first boot

  virtualbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache rootfs
        id: cache-rootfs-vbox
        uses: actions/cache@v4
        with:
          path: /tmp/ppsa-rootfs-cache.tar.gz
          key: ppsa-rootfs-${{ hashFiles('scripts/**/*.sh', 'compose/**', 'docker/**', '.github/workflows/build-release.yml') }}-v3

      - name: Install build tools (including qemu-utils for VDI conversion)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            debootstrap parted e2fsprogs dosfstools \
            grub-pc-bin grub-efi-amd64-bin rsync cpio \
            xz-utils util-linux qemu-utils zstd

      - name: Build 12GB test image (matches default in build-live-usb.sh; v1.1.1+)
        env:
          TMPDIR: ${{ runner.temp }}
          PPSA_CACHE_FILE: /tmp/ppsa-rootfs-cache.tar.gz
          PPSA_SKIP_BOOTSTRAP: ${{ steps.cache-rootfs-vbox.outputs.cache-hit == 'true' && '1' || '' }}
          PPSA_WG_API_URL: ${{ secrets.PPSA_WG_API_URL }}
          PPSA_WG_API_USER: ${{ secrets.PPSA_WG_API_USER }}
          PPSA_WG_API_PASS: ${{ secrets.PPSA_WG_API_PASS }}
          PPSA_WG_PEER_NAME: ${{ secrets.PPSA_WG_PEER_NAME }}
          PPSA_WG_PREFERRED_IP: ${{ secrets.PPSA_WG_PREFERRED_IP }}
          # Optional LAN/public WG endpoint overrides (see
          # docs/dual-boot-install.md). Both have sensible defaults
          # in ppsa-wireguard-register.sh so unset is fine.
          PPSA_WG_LAN_ENDPOINT: ${{ secrets.PPSA_WG_LAN_ENDPOINT }}
          PPSA_WG_PUBLIC_ENDPOINT: ${{ secrets.PPSA_WG_PUBLIC_ENDPOINT }}
          # Hardcoded WireGuard failsafe config (base64 full wg0.conf, used
          # when auto-registration above fails or is unconfigured).
          PPSA_WG_FALLBACK_CONF_B64: ${{ secrets.PPSA_WG_FALLBACK_CONF_B64 }}
          # SSH LAN/WAN exposure opt-in (default false = WireGuard-only).
          PPSA_EXPOSE_SSH_LAN: ${{ inputs.expose_ssh_lan || 'false' }}
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          # sudo env_reset strips PPSA_WG_*; -E preserves them.
          sudo -E bash scripts/build-live-usb.sh \
            --output "ppsa-vbox-${VER}.img" --size 12288

      - name: Convert raw → VDI
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          qemu-img convert -f raw -O vdi "ppsa-vbox-${VER}.img" "ppsa-vbox-${VER}.vdi"
          rm -f "ppsa-vbox-${VER}.img"

      - name: Compress VDI (zstd -10)
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          zstd -10 -T0 --no-progress "ppsa-vbox-${VER}.vdi" -o "ppsa-vbox-${VER}.vdi.zst"

      - name: Generate checksum
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          F="ppsa-vbox-${VER}.vdi.zst"
          sha256sum "$F" > "${F}.sha256"

      - name: Upload build artifact (workflow_dispatch only, not a release)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ppsa-vbox-${{ inputs.version }}
          path: |
            ppsa-vbox-*.zst
            ppsa-vbox-*.zst.sha256
          retention-days: 14

      - name: Upload to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ppsa-vbox-*.zst
            ppsa-vbox-*.zst.sha256
          tag_name: ${{ github.ref_name }}
          name: PPSA ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
