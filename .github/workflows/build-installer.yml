name: Build PPSA Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'PPSA version to bundle in the installer (e.g. v1.1.16)'
        required: true
        type: string
      force_rebuild:
        description: 'Force live-build cache invalidation'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-installer:
    name: Build installer ISO
    runs-on: ubuntu-latest
    container:
      image: debian:13-slim
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -e
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              live-build \
              rsync \
              zstd \
              ca-certificates \
              git \
              curl \
              xorriso
          rm -rf /var/lib/apt/lists/*
          lb --version

      - name: Fetch PPSA USB image from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p installer/config/includes.binary/ppsa
          cd installer/config/includes.binary/ppsa

          # Resolve the asset URLs via the GitHub API (gh CLI is not in the slim container)
          API="https://api.github.com/repos/kaiser62/ppsa/releases/tags/${{ inputs.version }}"
          echo "Querying $API"
          curl -sSL -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
              "$API" -o /tmp/release.json

          IMG_URL=$(python3 -c "import json; d=json.load(open('/tmp/release.json')); a=[x for x in d['assets'] if x['name'].startswith('ppsa-usb-') and x['name'].endswith('.img.zst')]; print(a[0]['browser_download_url'])")
          SHA_URL=$(python3 -c "import json; d=json.load(open('/tmp/release.json')); a=[x for x in d['assets'] if x['name'].startswith('ppsa-usb-') and x['name'].endswith('.img.zst.sha256')]; print(a[0]['browser_download_url'])")

          echo "Image URL:  $IMG_URL"
          echo "SHA256 URL: $SHA_URL"

          curl -sSL -H "Authorization: token ${GH_TOKEN}" "$IMG_URL" -o ppsa-usb.img.zst
          curl -sSL -H "Authorization: token ${GH_TOKEN}" "$SHA_URL" -o ppsa-usb.img.zst.sha256

          # Restore the original filename so the .sha256 file can verify it
          ORIGINAL_IMG=$(awk '{print $2}' ppsa-usb.img.zst.sha256 | sed 's/^\*//')
          mv ppsa-usb.img.zst "$ORIGINAL_IMG"
          SHA_FILE="${ORIGINAL_IMG}.sha256"
          mv ppsa-usb.img.zst.sha256 "$SHA_FILE"

          ls -la
          echo "Bundled image: $ORIGINAL_IMG"
          echo "SHA256 file:   $SHA_FILE"
          sha256sum -c "$SHA_FILE"

      - name: Build live ISO
        run: |
          set -e
          cd installer
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
              lb clean
          fi
          lb build 2>&1 | tail -200
          ls -la *.iso

      - name: Compress ISO and emit SHA
        run: |
          set -e
          cd installer
          ISO=$(ls live-image-*.hybrid.iso | head -1)
          OUT="ppsa-installer-${{ inputs.version }}.iso.zst"
          zstd -T0 -19 -o "../${OUT}" "${ISO}"
          cd ..
          sha256sum "${OUT}" > "${OUT}.sha256"
          ls -la "${OUT}"*

      - name: Upload to release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "PPSA ${{ inputs.version }}"
          prerelease: true
          draft: true
          fail_on_unmatched_files: true
          files: |
            ppsa-installer-${{ inputs.version }}.iso.zst
            ppsa-installer-${{ inputs.version }}.iso.zst.sha256
