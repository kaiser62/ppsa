# =============================================================================
# PPSA - Build Installer ISO
# =============================================================================
# Release policy (matches build-release.yml): a `vX.Y.Z` tag push builds the
# installer ISO and attaches it to that tag's existing GitHub Release (created
# by build-release.yml). workflow_dispatch builds are for manual/dev testing
# only and upload a workflow artifact instead of publishing a release.
# =============================================================================

name: Build PPSA Installer

on:
  push:
    branches: [master, netbird]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Label for this test build (e.g. v1.1.16-test). Does not publish a release.'
        required: true
        type: string
      force_rebuild:
        description: 'Force live-build cache invalidation'
        required: false
        type: boolean
        default: false
      seed_image_size_mb:
        description: 'Raw PPSA seed image size to bundle in the installer ISO'
        required: false
        type: string
        default: '6144'
      expose_ssh_lan:
        description: 'Expose SSH (22, 10022) on LAN/WAN. Default: WireGuard-only.'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build-installer:
    name: Build installer ISO
    runs-on: ubuntu-latest
    container:
      image: debian:13-slim
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache rootfs
        id: cache-rootfs
        uses: actions/cache@v4
        with:
          path: /tmp/ppsa-rootfs-cache.tar.gz
          key: ppsa-installer-rootfs-${{ hashFiles('scripts/**/*.sh', 'compose/**', 'docker/**', '.github/workflows/build-installer.yml') }}-v2

      - name: Install build dependencies
        run: |
          set -e
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              live-build \
              debootstrap \
              parted \
              e2fsprogs \
              dosfstools \
              rsync \
              cpio \
              xz-utils \
              util-linux \
              udev \
              zstd \
              ca-certificates \
              git \
              curl \
              xorriso \
              isolinux \
              syslinux-common \
              syslinux-utils \
              grub-efi-amd64-bin \
              grub-pc-bin \
              mtools \
              jq \
              gnupg
          rm -rf /var/lib/apt/lists/*
          lb --version

      - name: Build compact PPSA seed image
        env:
          TMPDIR: /tmp
          PPSA_CACHE_FILE: /tmp/ppsa-rootfs-cache.tar.gz
          PPSA_SKIP_BOOTSTRAP: ${{ steps.cache-rootfs.outputs.cache-hit == 'true' && '1' || '' }}
          # WireGuard auto-registration creds, same as build-release.yml.
          # Without these the bundled seed ships enabled=false and installer
          # installs never join the WireGuard network.
          # WG DEPRECATED (NetBird primary): baked disabled unless PPSA_WG_ENABLED='true'.
          PPSA_WG_ENABLED: ${{ vars.PPSA_WG_ENABLED || 'false' }}
          PPSA_WG_API_URL: ${{ secrets.PPSA_WG_API_URL }}
          PPSA_WG_API_USER: ${{ secrets.PPSA_WG_API_USER }}
          PPSA_WG_API_PASS: ${{ secrets.PPSA_WG_API_PASS }}
          PPSA_WG_PEER_NAME: ${{ secrets.PPSA_WG_PEER_NAME }}
          PPSA_WG_PREFERRED_IP: ${{ secrets.PPSA_WG_PREFERRED_IP }}
          PPSA_WG_LAN_ENDPOINT: ${{ secrets.PPSA_WG_LAN_ENDPOINT }}
          PPSA_WG_PUBLIC_ENDPOINT: ${{ secrets.PPSA_WG_PUBLIC_ENDPOINT }}
          PPSA_WG_FALLBACK_CONF_B64: ${{ secrets.PPSA_WG_FALLBACK_CONF_B64 }}
          # NetBird unattended enrollment (netbird branch; empty = disabled)
          PPSA_NB_MANAGEMENT_URL: ${{ secrets.PPSA_NB_MANAGEMENT_URL }}
          PPSA_NB_SETUP_KEY: ${{ secrets.PPSA_NB_SETUP_KEY }}
          PPSA_EXPOSE_SSH_LAN: ${{ inputs.expose_ssh_lan || 'false' }}
        run: |
          set -e
          mkdir -p installer/config/includes.binary/ppsa
          cd installer/config/includes.binary/ppsa

          VERSION="${{ inputs.version || github.ref_name }}"
          SIZE_MB="${{ inputs.seed_image_size_mb || '6144' }}"

          cd ../../../..
          bash scripts/build-live-usb.sh \
              --output "installer/config/includes.binary/ppsa/ppsa-usb-${VERSION}.img" \
              --size "${SIZE_MB}"

          cd installer/config/includes.binary/ppsa
          zstd -T0 -19 --rm "ppsa-usb-${VERSION}.img"
          sha256sum "ppsa-usb-${VERSION}.img.zst" > "ppsa-usb-${VERSION}.img.zst.sha256"
          ls -la
          sha256sum -c "ppsa-usb-${VERSION}.img.zst.sha256"

      - name: Build live ISO
        run: |
          set -e
          cd installer
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
              lb clean
          fi
          lb build 2>&1 | tail -200
          ls -la *.iso

      - name: Compress ISO and emit SHA
        run: |
          set -e
          cd installer
          VERSION="${{ inputs.version || github.ref_name }}"
          ISO=$(ls live-image-*.hybrid.iso | head -1)
          OUT="ppsa-installer-${VERSION}.iso.zst"
          zstd -T0 -19 -o "../${OUT}" "${ISO}"
          cd ..
          sha256sum "${OUT}" > "${OUT}.sha256"
          ls -la "${OUT}"*

      - name: Upload build artifact (workflow_dispatch only, not a release)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ppsa-installer-${{ inputs.version }}
          path: |
            ppsa-installer-${{ inputs.version }}.iso.zst
            ppsa-installer-${{ inputs.version }}.iso.zst.sha256
          retention-days: 14

      - name: Attach ISO to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PPSA ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            ppsa-installer-${{ github.ref_name }}.iso.zst
            ppsa-installer-${{ github.ref_name }}.iso.zst.sha256
