name: Build PPSA Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'PPSA version to bundle in the installer (e.g. v1.1.16)'
        required: true
        type: string
      force_rebuild:
        description: 'Force live-build cache invalidation'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-installer:
    name: Build installer ISO
    runs-on: ubuntu-latest
    container:
      image: debian:13-slim
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -e
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              live-build \
              rsync \
              zstd \
              ca-certificates \
              git \
              curl \
              xorriso \
              jq
          rm -rf /var/lib/apt/lists/*
          lb --version

      - name: Fetch PPSA USB image from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p installer/config/includes.binary/ppsa
          cd installer/config/includes.binary/ppsa

          # GitHub draft releases use a synthetic "untagged-..." tag in the download URL.
          # Look up the real tag via the API.
          VERSION="${{ inputs.version }}"
          API="https://api.github.com/repos/kaiser62/ppsa/releases/tags/${VERSION}"
          REAL_TAG=$(curl -fsSL \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$API" | jq -r '.tag_name')
          if [[ -z "$REAL_TAG" || "$REAL_TAG" == "null" ]]; then
              echo "ERROR: could not resolve release $VERSION"
              exit 1
          fi
          echo "Resolved $VERSION -> $REAL_TAG"

          IMG_NAME="ppsa-usb-${VERSION}.img.zst"
          SHA_NAME="${IMG_NAME}.sha256"
          BASE="https://github.com/kaiser62/ppsa/releases/download/${REAL_TAG}"

          echo "Fetching $IMG_NAME from $BASE"
          curl -fsSL -H "Authorization: token ${GH_TOKEN}" "$BASE/$IMG_NAME" -o "$IMG_NAME"
          curl -fsSL -H "Authorization: token ${GH_TOKEN}" "$BASE/$SHA_NAME" -o "$SHA_NAME"

          ls -la
          sha256sum -c "$SHA_NAME"

      - name: Build live ISO
        run: |
          set -e
          cd installer
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
              lb clean
          fi
          lb build 2>&1 | tail -200
          ls -la *.iso

      - name: Compress ISO and emit SHA
        run: |
          set -e
          cd installer
          ISO=$(ls live-image-*.hybrid.iso | head -1)
          OUT="ppsa-installer-${{ inputs.version }}.iso.zst"
          zstd -T0 -19 -o "../${OUT}" "${ISO}"
          cd ..
          sha256sum "${OUT}" > "${OUT}.sha256"
          ls -la "${OUT}"*

      - name: Upload to release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "PPSA ${{ inputs.version }}"
          prerelease: true
          draft: true
          fail_on_unmatched_files: true
          files: |
            ppsa-installer-${{ inputs.version }}.iso.zst
            ppsa-installer-${{ inputs.version }}.iso.zst.sha256
