name: Build PPSA Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'PPSA version to bundle in the installer (e.g. v1.1.16)'
        required: true
        type: string
      force_rebuild:
        description: 'Force live-build cache invalidation'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-installer:
    name: Build installer ISO
    runs-on: ubuntu-latest
    container:
      image: debian:13-slim
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -e
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              live-build \
              rsync \
              zstd \
              ca-certificates \
              git \
              curl \
              xorriso
          rm -rf /var/lib/apt/lists/*
          lb --version

      - name: Fetch PPSA USB image from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p installer/config/includes.binary/ppsa
          cd installer/config/includes.binary/ppsa

          # Resolve the asset URLs via the GitHub API.
          # python3 is not in the slim image; use curl + grep/sed.
          API="https://api.github.com/repos/kaiser62/ppsa/releases/tags/${{ inputs.version }}"
          curl -sSL -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
              "$API" -o /tmp/release.json

          # Extract the two asset names we want
          IMG_NAME=$(grep -oE '"name":\s*"ppsa-usb-v[0-9.]+\.img\.zst"' /tmp/release.json | head -1 | sed -E 's/.*"ppsa-(usb-v[0-9.]+\.img\.zst)".*/\1/')
          SHA_NAME=$(grep -oE '"name":\s*"ppsa-usb-v[0-9.]+\.img\.zst\.sha256"' /tmp/release.json | head -1 | sed -E 's/.*"ppsa-(usb-v[0-9.]+\.img\.zst\.sha256)".*/\1/')
          if [[ -z "$IMG_NAME" || -z "$SHA_NAME" ]]; then
              echo "ERROR: could not find ppsa-usb-*.img.zst in release ${{ inputs.version }}"
              grep -oE '"name":\s*"[^"]+"' /tmp/release.json | head -20
              exit 1
          fi
          echo "Image:  $IMG_NAME"
          echo "SHA256: $SHA_NAME"

          BASE="https://github.com/kaiser62/ppsa/releases/download/${{ inputs.version }}"
          curl -sSL -H "Authorization: token ${GH_TOKEN}" "$BASE/$IMG_NAME" -o "$IMG_NAME"
          curl -sSL -H "Authorization: token ${GH_TOKEN}" "$BASE/$SHA_NAME" -o "$SHA_NAME"

          ls -la
          sha256sum -c "$SHA_NAME"

      - name: Build live ISO
        run: |
          set -e
          cd installer
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
              lb clean
          fi
          lb build 2>&1 | tail -200
          ls -la *.iso

      - name: Compress ISO and emit SHA
        run: |
          set -e
          cd installer
          ISO=$(ls live-image-*.hybrid.iso | head -1)
          OUT="ppsa-installer-${{ inputs.version }}.iso.zst"
          zstd -T0 -19 -o "../${OUT}" "${ISO}"
          cd ..
          sha256sum "${OUT}" > "${OUT}.sha256"
          ls -la "${OUT}"*

      - name: Upload to release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "PPSA ${{ inputs.version }}"
          prerelease: true
          draft: true
          fail_on_unmatched_files: true
          files: |
            ppsa-installer-${{ inputs.version }}.iso.zst
            ppsa-installer-${{ inputs.version }}.iso.zst.sha256
